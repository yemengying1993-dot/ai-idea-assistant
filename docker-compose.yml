version: '3.8'

services:
  idea-bot:
    build: .
    container_name: idea-recording-bot
    ports:
      - "5000:5000"
    volumes:
      - ./ideas:/app/ideas
      - ./.env:/app/.env
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
